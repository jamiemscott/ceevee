<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamie Scott — Frontend Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.min.css">
</head>
<body>

<!-- ─── CINE STAGE — countdown and video share this frame ─── -->
<div id="cine-stage">
  <div id="cine-frame">

    <div class="cine-strip cine-strip--l"></div>

    <div id="cine-wrap">

      <!-- video (paused until countdown ends) -->
      <video id="cine-video" muted playsinline>
        <source src="https://res.cloudinary.com/jamie-scott-co-uk/video/upload/q_auto,f_auto,vc_auto/videos/man-walking-in-a-forest-on-a-misty-morning" type="video/mp4">
      </video>

      <!-- countdown sits inside the same frame, overlaying the (black) video -->
      <div id="cine-countdown">
        <div class="cd-frame">
          <svg class="cd-rings" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="200" cy="200" r="192" stroke="rgba(240,237,232,0.55)" stroke-width="1.5" fill="none"/>
            <circle cx="200" cy="200" r="148" stroke="rgba(240,237,232,0.2)"  stroke-width="0.8" fill="none"/>
            <circle cx="200" cy="200" r="96"  stroke="rgba(240,237,232,0.25)" stroke-width="0.8" fill="none"/>
            <line x1="0"   y1="200" x2="400" y2="200" stroke="rgba(240,237,232,0.35)" stroke-width="0.8"/>
            <line x1="200" y1="0"   x2="200" y2="400" stroke="rgba(240,237,232,0.35)" stroke-width="0.8"/>
            <line x1="200" y1="8"   x2="200" y2="32"  stroke="rgba(240,237,232,0.6)"  stroke-width="2"/>
            <line x1="200" y1="368" x2="200" y2="392" stroke="rgba(240,237,232,0.6)"  stroke-width="2"/>
            <line x1="8"   y1="200" x2="32"  y2="200" stroke="rgba(240,237,232,0.6)"  stroke-width="2"/>
            <line x1="368" y1="200" x2="392" y2="200" stroke="rgba(240,237,232,0.6)"  stroke-width="2"/>
            <line x1="56"  y1="56"  x2="70"  y2="70"  stroke="rgba(240,237,232,0.3)"  stroke-width="1"/>
            <line x1="344" y1="56"  x2="330" y2="70"  stroke="rgba(240,237,232,0.3)"  stroke-width="1"/>
            <line x1="56"  y1="344" x2="70"  y2="330" stroke="rgba(240,237,232,0.3)"  stroke-width="1"/>
            <line x1="344" y1="344" x2="330" y2="330" stroke="rgba(240,237,232,0.3)"  stroke-width="1"/>
          </svg>
          <div class="cd-sweep-wrap">
            <div class="cd-sweep" id="cd-sweep"></div>
          </div>
          <div class="cd-number" id="cd-num">5</div>
        </div>
        <div class="cd-meta">
          <span>JS&nbsp;·&nbsp;MMXXVI</span>
          <span>FR&nbsp;24</span>
          <span>Reel&nbsp;01</span>
        </div>
      </div>

      <!-- film effects — sit above both countdown and video -->
      <div class="cine-sepia"></div>
      <!-- grain canvas injected here by JS -->
      <div class="cine-interference"></div>
      <div class="cine-scanlines"></div>
      <div class="cine-vignette"></div>
      <div class="cine-flicker"></div>
      <div class="cine-glitch-a"></div>
      <div class="cine-glitch-b"></div>
      <div class="cine-scratch"></div>
      <div class="cine-mark cine-mark--tr"></div>
      <div class="cine-mark cine-mark--br"></div>
      <div class="cine-title">
        <span>JS&nbsp;·&nbsp;MMXXVI</span>
        <span>Reel&nbsp;01</span>
      </div>

      <!-- inter-frame flash — above everything in the frame -->
      <div id="cd-flash"></div>

    </div>

    <div class="cine-strip cine-strip--r"></div>
  </div>

  <!-- full-screen darkening overlay (used during expansion) -->
  <div id="expand-overlay"></div>
</div>

<!-- signature + scroll indicator -->
<div id="hero-sig">
  <div class="hero-sig-inner">
    <img src="assets/svgs/signature-white.svg" alt="Jamie Scott">
    <div class="scroll-hint" id="scroll-hint">
      <div class="sh-line-wrap"></div>
      <div class="sh-chevrons">
        <div class="sh-chev"></div>
        <div class="sh-chev"></div>
        <div class="sh-chev"></div>
      </div>
      <span class="sh-text">Scroll to enter</span>
    </div>
  </div>
</div>

<div id="cine-skip">Skip →</div>

<script src="src/js/main.js" defer></script>

</body>
</html>
